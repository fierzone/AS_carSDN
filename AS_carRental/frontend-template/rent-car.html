<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRent - Book Car</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-car-front-fill me-2"></i>AutoRent</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="bg-white p-5 rounded-4 shadow-sm">
                    <h2 class="fw-bold mb-4">Complete Your Booking</h2>

                    <div class="d-flex align-items-center mb-4 p-3 border rounded">
                        <img src="https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&q=80&w=150"
                            class="rounded me-3" alt="Tesla" style="width: 120px; height: 80px; object-fit: cover;">
                        <div>
                            <h5 class="fw-bold mb-1">Tesla Model 3</h5>
                            <p class="text-muted mb-0">Price: <span class="fw-semibold text-primary"
                                    id="daily-price">$85</span> / day</p>
                        </div>
                    </div>

                    <div id="bookingError" class="alert alert-danger d-none mb-3"></div>
                    <form id="rentalForm">
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Pick-up Date & Time</label>
                                <input type="datetime-local" class="form-control" id="startDate" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Drop-off Date & Time</label>
                                <input type="datetime-local" class="form-control" id="endDate" required>
                            </div>
                        </div>

                        <div class="bg-light p-4 rounded mb-4">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Total Calculated Days</span>
                                <span class="fw-semibold" id="totalDays">0</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Daily Rate</span>
                                <span class="fw-semibold" id="displayDailyRate">$0</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fs-5 fw-bold">Total Amount</span>
                                <span class="fs-3 fw-bold text-primary" id="totalAmount">$0</span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 fs-5">Confirm Booking</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script>
        const startDate = document.getElementById('startDate');
        const endDate = document.getElementById('endDate');
        const totalDaysEl = document.getElementById('totalDays');
        const totalAmountEl = document.getElementById('totalAmount');
        const displayDailyRateEl = document.getElementById('displayDailyRate');
        const rentalForm = document.getElementById('rentalForm');

        let dailyRate = 0;
        let carId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            carId = urlParams.get('id');

            if (!carId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const res = await fetch(`/api/cars/${carId}`);
                if (!res.ok) throw new Error('Car not found');
                const car = await res.json();

                dailyRate = car.pricePerDay;
                displayDailyRateEl.textContent = formatCurrency(dailyRate);

                const displayName = car.name || car.model || 'Unknown Car';

                document.querySelector('.fw-bold.mb-1').textContent = displayName;
                document.getElementById('daily-price').textContent = formatCurrency(dailyRate);
                document.querySelector('.rounded.me-3').src = (car.image && car.image.startsWith('http')) ? car.image : 'https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&q=80&w=150';

            } catch (err) {
                Swal.fire('Error', "Can't fetch car details.", 'error').then(() => {
                    window.location.href = 'index.html';
                });
            }
        });

        function calculateTotal() {
            if (startDate.value && endDate.value) {
                const start = new Date(startDate.value);
                const end = new Date(endDate.value);
                if (end > start) {
                    const diffTime = Math.abs(end - start);
                    const diffHours = diffTime / (1000 * 60 * 60);
                    const days = Math.ceil(diffHours / 24) || 1;
                    totalDaysEl.textContent = days;
                    totalAmountEl.textContent = formatCurrency(days * dailyRate);
                } else {
                    totalDaysEl.textContent = 0;
                    totalAmountEl.textContent = '$0';
                }
            }
        }

        startDate.addEventListener('change', calculateTotal);
        endDate.addEventListener('change', calculateTotal);

        rentalForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const startVal = startDate.value;
            const endVal = endDate.value;

            if (new Date(startVal) >= new Date(endVal)) {
                Swal.fire('Invalid Dates', 'Drop-off time must be after Pick-up time', 'warning');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';

            try {
                const data = await authFetch('/api/bookings', {
                    method: 'POST',
                    body: JSON.stringify({ carId, startDate: startVal, endDate: endVal })
                });

                if (data.message && (data.message.toLowerCase().includes('already booked') || data.message.toLowerCase().includes('overlap'))) {
                    throw new Error(data.message);
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Booking Requested!',
                    text: 'Your booking is pending admin approval.',
                    confirmButtonText: 'View My History'
                }).then(() => {
                    window.location.href = 'history.html';
                });

            } catch (err) {
                Swal.fire('Booking Failed', err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Confirm Booking';
            }
        });

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        const tzNow = now.toISOString().slice(0, 16);
        startDate.setAttribute('min', tzNow);
        endDate.setAttribute('min', tzNow);
    </script>

</body>

</html>
