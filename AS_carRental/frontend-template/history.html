<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRent - Booking History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-car-front-fill me-2"></i>AutoRent</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center" id="nav-auth-area">
                    <!-- Nav items will be injected automatically based on login state from js/api.js -->
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">My Rental History</h2>

        <div class="table-responsive">
            <table class="table table-custom table-hover">
                <thead>
                    <tr>
                        <th scope="col">Car</th>
                        <th scope="col">Start Date</th>
                        <th scope="col">End Date</th>
                        <th scope="col">Total Amount</th>
                        <th scope="col">Status</th>
                        <th scope="col">Action</th>
                    </tr>
                </thead>
                <tbody id="bookings-tbody">
                    <tr>
                        <td colspan="6" class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">Loading your bookings...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            loadBookings();
        });

        async function loadBookings() {
            const tbody = document.getElementById('bookings-tbody');
            try {
                const bookings = await authFetch('/api/bookings/mybookings');

                if (bookings.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4">You have no bookings yet.</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                bookings.forEach(b => {
                    const carName = b.car ? (b.car.name || b.car.model || 'Unknown') : 'Deleted Car';
                    const carImg = (b.car && b.car.image && b.car.image.startsWith('http')) ? b.car.image : 'https://images.unsplash.com/photo-1550355291-bbee04a92027?auto=format&fit=crop&q=80&w=100';

                    const sDate = new Date(b.startDate).toLocaleString();
                    const eDate = new Date(b.endDate).toLocaleString();

                    let statusBadge = '';
                    let actionBtn = '';

                    // Trạng thái Cancel
                    if (b.status === 'Cancelled') {
                        statusBadge = '<span class="badge bg-secondary badge-status">Cancelled</span>';
                        actionBtn = '<button class="btn btn-sm btn-outline-secondary disabled">N/A</button>';
                    } else if (b.status === 'Completed') {
                        statusBadge = '<span class="badge bg-success badge-status">Completed</span>';
                        actionBtn = '<button class="btn btn-sm btn-outline-secondary disabled">N/A</button>';
                    } else {
                        // Ongoing/Upcoming
                        statusBadge = `<span class="badge bg-warning text-dark badge-status">${b.status || 'Active'}</span>`;
                        actionBtn = `<button class="btn btn-sm btn-outline-danger" onclick="cancelBooking('${b._id}')">Cancel</button>`;
                    }

                    tbody.innerHTML += `
                    <tr>
                        <td>
                            <div class="d-flex align-items-center">
                                <img src="${carImg}" class="rounded me-3" style="width: 60px; height: 40px; object-fit: cover;">
                                <span class="fw-semibold">${carName}</span>
                            </div>
                        </td>
                        <td>${sDate}</td>
                        <td>${eDate}</td>
                        <td class="fw-bold text-primary">${formatCurrency(b.totalAmount)}</td>
                        <td>${statusBadge}</td>
                        <td>${actionBtn}</td>
                    </tr>`;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load bookings: ${err.message}</td></tr>`;
            }
        }

        async function cancelBooking(id) {
            if (!confirm('Are you sure you want to cancel this booking?')) return;

            try {
                const res = await authFetch(`/api/bookings/${id}/cancel`, { method: 'PUT' });
                alert('Booking cancelled successfully!');
                loadBookings(); // reload
            } catch (err) {
                alert('Error cancelling booking: ' + err.message);
            }
        }
    </script>
</body>

</html>
