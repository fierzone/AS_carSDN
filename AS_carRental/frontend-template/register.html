<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRent - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-car-front-fill me-2"></i>AutoRent</a>
        </div>
    </nav>

    <div class="container auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Create an Account</h2>
                <p class="text-muted">Join AutoRent today to start booking.</p>
            </div>

            <form id="registerForm">
                <div id="errorMsg" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="0123456789" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fs-5">Register</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted">Already have an account? <a href="login.html"
                        class="text-primary fw-semibold text-decoration-none">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                Swal.fire('Oops...', 'Passwords do not match', 'warning');
                return;
            }

            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Creating count...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, phone, password, confirmPassword })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Registration failed');

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data));

                Swal.fire({
                    icon: 'success',
                    title: 'Account Created!',
                    text: 'Welcome to AutoRent. Redirecting...',
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = 'index.html';
                });

            } catch (err) {
                Swal.fire('Registration Error', err.message, 'error');
                btn.innerHTML = 'Register';
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
