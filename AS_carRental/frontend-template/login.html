<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRent - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-car-front-fill me-2"></i>AutoRent</a>
        </div>
    </nav>

    <div class="container auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Please sign in to your account.</p>
            </div>

            <form id="loginForm">
                <div id="errorMsg" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-semibold">Password</label>
                        <a href="#" class="text-primary text-decoration-none small">Forgot password?</a>
                    </div>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fs-5">Login</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted">Don't have an account? <a href="register.html"
                        class="text-primary fw-semibold text-decoration-none">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sign-in...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.message || 'Login failed');

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data));

                Swal.fire({
                    icon: 'success',
                    title: 'Welcome back!',
                    text: 'Login successful. Redirecting...',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'index.html';
                });

            } catch (err) {
                Swal.fire('Login Error', err.message, 'error');
                btn.innerHTML = 'Login';
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
